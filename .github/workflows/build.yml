name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Generate Keystore
      run: |
        if [ ! -f "app/azra.jks" ]; then
          keytool -genkey -v -keystore app/azra.jks -keyalg RSA -keysize 2048 -validity 10000 -alias azra -dname "CN=Azra, OU=Azra, O=Azra, L=Unknown, ST=Unknown, C=US" -storepass azrapassword -keypass azrapassword
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/azra.jks
          git commit -m "Auto-generate release keystore"
          git push || echo "Push failed, continuing with temporary keystore"
        fi

    - name: Build Release APK
      run: gradle assembleRelease

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        tag_name: latest
        name: Latest Build
        files: app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Azra-Release-APK
        path: app/build/outputs/apk/release/app-release.apk
